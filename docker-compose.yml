services:
  app:
    image: node:20-alpine
    container_name: mytradebook-app
    restart: unless-stopped
    working_dir: /app
    environment:
      LOCAL_DATA_DIR: /app/.mytradebook-data
      SESSION_SECRET: change-this-to-a-long-random-secret
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
      - mytradebook_data:/app/.mytradebook-data
    command: sh -c "npm install && npm run build && npm run start"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mytradebook_data:
